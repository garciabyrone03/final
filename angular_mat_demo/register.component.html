<div class="form-container" style="padding: 20px; max-width: 500px; margin: auto;">
  <h2>Registration Form</h2>
  <form [formGroup]="formdata" (ngSubmit)="onClickSubmit(formdata.value)">

    <mat-form-field appearance="outline" style="width: 100%;">
      <mat-label>User Name</mat-label>
      <input matInput formControlName="userName">
      <mat-error *ngIf="formdata.get('userName')?.invalid">User Name is required</mat-error>
    </mat-form-field>

    <mat-form-field appearance="outline" style="width: 100%;">
      <mat-label>Email</mat-label>
      <input matInput formControlName="email">
    </mat-form-field>

    <mat-form-field appearance="outline" style="width: 100%;">
      <mat-label>Password</mat-label>
      <input matInput type="password" formControlName="password">
    </mat-form-field>

    <div style="margin: 10px 0;">
      <label>Gender: </label>
      <mat-radio-group formControlName="gender">
        <mat-radio-button value="male">Male</mat-radio-button>
        <mat-radio-button value="female">Female</mat-radio-button>
      </mat-radio-group>
    </div>

    <mat-form-field appearance="outline" style="width: 100%;">
      <mat-label>Address</mat-label>
      <textarea matInput formControlName="address"></textarea>
    </mat-form-field>

    <mat-form-field appearance="outline" style="width: 100%;">
      <mat-label>Choose a date</mat-label>
      <input matInput [matDatepicker]="picker" formControlName="birthDate">
      <mat-hint>MM/DD/YYYY</mat-hint>
      <mat-datepicker-toggle matIconSuffix [for]="picker"></mat-datepicker-toggle>
      <mat-datepicker #picker></mat-datepicker>
    </mat-form-field>

    <div style="margin: 20px 0;">
      <label>Angular Skill Level</label>
      <mat-slider min="0" max="10" step="1" discrete>
        <input matSliderThumb formControlName="angularSkillLevel">
      </mat-slider>
    </div>

    <button mat-raised-button color="primary" type="submit">Register</button>
  </form>
</div>
